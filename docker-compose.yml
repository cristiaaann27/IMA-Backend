services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: precipitation-api
    restart: unless-stopped
    expose:
      - "8000"
    mem_limit: 768m
    memswap_limit: 1024m
    volumes:
      - ~/models:/app/models
      - ~/data:/app/data
      - ~/reports:/app/reports
    environment:
      - ENVIRONMENT=production
      - API_PREFIX=/api/v1
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://ima.up.railway.app}
    env_file:
      - .env
    networks:
      - precipitation-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: precipitation-nginx
    restart: unless-stopped
    mem_limit: 64m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - precipitation-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  precipitation-network:
    driver: bridge
