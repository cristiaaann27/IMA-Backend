services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: precipitation-api
    restart: unless-stopped
    expose:
      - "8000"
    mem_limit: 4g
    memswap_limit: 5g  # permite hasta 1g de swap (5 - 4)
    volumes:
      - ~/models:/app/models
      - ~/data:/app/data
      - ~/reports:/app/reports
    environment:
      - ENVIRONMENT=production
      - API_PREFIX=/api/v1
      # ADVERTENCIA: asegúrate de definir ALLOWED_ORIGINS en .env con tu dominio DuckDNS
      # Ej: ALLOWED_ORIGINS=https://tu-subdominio.duckdns.org
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    env_file:
      - .env
    networks:
      - precipitation-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: precipitation-nginx
    restart: unless-stopped
    mem_limit: 64m
    memswap_limit: 64m  # sin swap para nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
      # Volumen de Certbot comentado — activar solo si migras a Let's Encrypt
      # - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend  # arranca después del backend, pero sin bloquearse si el healthcheck falla
    networks:
      - precipitation-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  precipitation-network:
    driver: bridge