upstream backend_api {
    server precipitation-api:8000;  # nombre real del contenedor
    keepalive 8;
}

# ---- Headers de proxy comunes ----
# Definidos una vez, heredados por todos los location blocks
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- Redirigir HTTP a HTTPS ----
server {
    listen 80;
    server_name _;  # setup_duckdns.sh reemplaza esto automáticamente

    # Permitir Let's Encrypt challenge (preparado para migración futura)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- Servidor HTTPS ----
server {
    listen 443 ssl http2;
    server_name _;  # setup_duckdns.sh reemplaza esto automáticamente

    # Certificados SSL (autofirmado — reemplazar con Let's Encrypt en el futuro)
    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Protocolos y ciphers modernos — elimina suites obsoletas incluidas en HIGH
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de seguridad
    add_header X-Content-Type-Options      "nosniff"                        always;
    add_header X-Frame-Options             "DENY"                           always;
    add_header X-XSS-Protection            "1; mode=block"                  always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    # HSTS conservador (1 día) hasta migrar a Let's Encrypt — evita bloqueos por cert inválido
    add_header Strict-Transport-Security   "max-age=86400; includeSubDomains" always;

    # Límite de conexiones por IP — reducido a 10 para proteger el único worker del backend
    limit_conn conn_limit 10;

    # Reintentar upstream en errores de red o timeout (útil si el backend reinicia)
    proxy_next_upstream error timeout http_502 http_503;

    # ---- Endpoints de predicción — rate limit estricto (2 req/s, intensivos en CPU) ----
    # ^~ da prioridad explícita sobre el prefix match /api/v1/ de abajo
    location ^~ /api/v1/predict {
        limit_req zone=predict_limit burst=5 nodelay;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    location ^~ /api/v1/forecast {
        limit_req zone=predict_limit burst=5 nodelay;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ---- API general — rate limit 10 req/s con burst de 20 ----
    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Buffering para respuestas JSON
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }

    # ---- Root y docs (FastAPI: /docs, /redoc, /openapi.json) ----
    # Aplicamos api_limit para evitar abuso — antes sin ningún límite
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- Health check nginx — sin logs, sin rate limit ----
    # Nota: el healthcheck de docker-compose apunta a /api/v1/health en el backend directamente.
    # Este endpoint confirma que nginx está vivo, no que el backend lo esté.
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}