user nginx;
worker_processes auto;
worker_rlimit_nofile 1024;  # file descriptors disponibles: alineado con worker_connections * 2

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;  # realista para t2.micro (1 vCPU / 1GB RAM)
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Ocultar versión de nginx en headers y páginas de error
    server_tokens off;

    # Log con tiempo de respuesta — crítico para detectar degradación en endpoints ML
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Timeouts de cliente — protección contra slow HTTP attacks
    client_body_timeout    12s;
    client_header_timeout  12s;
    send_timeout           10s;
    reset_timedout_connection on;

    # Gzip — nivel 5 da ~98% del ratio del nivel 6 con menos CPU
    # gzip_min_length evita comprimir respuestas pequeñas (errores, health) que no se benefician
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # Rate limiting — status 429 es semánticamente correcto (no 503)
    limit_req_zone  $binary_remote_addr zone=api_limit:10m     rate=10r/s;
    limit_req_zone  $binary_remote_addr zone=predict_limit:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_status  429;
    limit_conn_status 429;

    include /etc/nginx/conf.d/*.conf;
}